<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link rel = "stylesheet" href = "style_index.css">
</head>
<body>
    <main>
        <h1>Bem-vindo ao Jogo de Adivinhação!</h1>
        <p>Escolha um número entre 1 e 100 e tente adivinhar o número secreto.</p>
        <input type="number" id="palpite" placeholder="Digite seu palpite 0 a 100">
        <button id="guessButton">Adivinhar</button>
        <p>Voce tem <span id="attempts">10</span> tentativas restantes.</p>
        <p id="message"></p>
</body>
</html>
